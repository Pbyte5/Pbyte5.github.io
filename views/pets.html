<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Soft Paws!</title>
        <link rel="stylesheet" href="/src/stylesheet/stylesheet-pet-store.css">
        <meta name="description"
            content="A social media platform for pet lovers to share photos, find friends, and discover local pet shops.">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=account_circle,add,arrow_back_ios,chat_bubble,menu,notifications,settings" />

    </head>
    <body>
        <header>
        </header>
        <div class="button-container">
            <button class="button">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </div>
        <div class="main-container">
            <aside class="left-container">
                <nav class="upper-menu">
                    <h2 class="page-title"> Soft Paws!</h2>
                    <ul class="upper-items">
                        <li><span class="material-symbols-outlined">chat_bubble</span>
                            Messages
                        </li>
                        <li><span class="material-symbols-outlined">notifications</span> 
                            Notifications</li>
                        <li><span class="material-symbols-outlined">add</span>
                            Create</li>
                    </ul>
                </nav>
                <nav class="bottom-menu">
                    <ul class="bottom-items">
                        <li><span class="material-symbols-outlined">account_circle</span>
                            Profile</li>
                        <li><span class="material-symbols-outlined gear">settings</span>
                            Settings</li>
                    </ul>
                </nav>
            </aside>


            <main class="central-container">
                <section class="stories">
                    <h3>Stories</h3>
                    <div class="stories-container">
                        <figure>
                            <img src="/public/img/dog1.png" alt="dog1">
                            <figcaption>
                                <img class="user-stories-photo" src="https://img.freepik.com/free-photo/front-view-smiley-woman-with-earbuds_23-2148613052.jpg?semt=ais_hybrid&w=740&q=80" alt="user-stories-photo">
                                Sarah</figcaption>
                        </figure>
                        <figure>
                            <img src="/public/img/dog2.png" alt="dog2">
                            <figcaption>
                                <img class="user-stories-photo" src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8cmFuZG9tJTIwcGVvcGxlfGVufDB8fDB8fHww" alt="user-stories-photo">
                                Carlos</figcaption>
                        </figure>
                        <figure>
                            <img src="/public/img/dog3.png" alt="dog3">
                            <figcaption>
                                <img  class="user-stories-photo" src="https://img.freepik.com/free-photo/portrait-white-man-isolated_53876-40306.jpg?semt=ais_hybrid&w=740&q=80" alt="user-stories-photo">
                                Gabriel</figcaption>
                        </figure>
                        <figure> 
                            <img src="/public/img/dog4.jpg" alt="dog">
                            <figcaption>
                                <img class="user-stories-photo" src="https://images.pexels.com/photos/2694513/pexels-photo-2694513.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1" alt="user-stories-photo">
                                Valentina</figcaption>
                        </figure>
                    </div>
                </section>
            </main>
            <aside class="right-container">

            </aside>
        </div>
        <footer>

        </footer>
        <script src="/src/js/scripts.js"></script>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    </body>
    </html>
